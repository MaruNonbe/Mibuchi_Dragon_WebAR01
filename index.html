<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#082223">
  <meta name="description" content="三淵渓谷の龍伝説をスマートフォンブラウザで体験するWebARプレビュー">
  <meta property="og:title" content="Mibuchi Dragon WebAR">
  <meta property="og:description" content="iPhone Safari / Android Chrome対応の龍ARプレビュー">
  <meta property="og:image" content="assets/images/thumbnail.jpg">
  <title>Mibuchi Dragon WebAR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(9, 35, 37, 0.78);
      --line: rgba(174, 229, 216, 0.22);
      --text: #edf8f4;
      --muted: #aac8c0;
      --accent: #66d9be;
      --accent-strong: #d9fff4;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(6, 26, 28, 0.72), rgba(6, 26, 28, 0.95)),
        url("assets/images/thumbnail.jpg") center / cover no-repeat;
      color: var(--text);
      overflow: hidden;
    }

    main {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 100vh;
      min-height: 100dvh;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      min-height: 58vh;
      background: transparent;
      --poster-color: transparent;
      --progress-bar-color: var(--accent);
      --progress-mask: rgba(6, 26, 28, 0.45);
    }

    .hud {
      position: fixed;
      inset: auto 0 0 0;
      padding: 18px max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      background: linear-gradient(180deg, transparent, rgba(4, 14, 15, 0.72) 18%, rgba(4, 14, 15, 0.94));
      pointer-events: none;
    }

    .hud-inner {
      display: grid;
      gap: 14px;
      max-width: 920px;
      margin: 0 auto;
      padding: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border-radius: 8px;
      pointer-events: auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 44px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .model-switcher,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button,
    a.action {
      appearance: none;
      border: 1px solid rgba(217, 255, 244, 0.3);
      border-radius: 8px;
      background: rgba(102, 217, 190, 0.13);
      color: var(--accent-strong);
      min-height: 44px;
      padding: 0 14px;
      font: inherit;
      font-weight: 650;
      text-decoration: none;
      cursor: pointer;
    }

    button:hover,
    a.action:hover {
      background: rgba(102, 217, 190, 0.22);
    }

    .model-button[aria-pressed="true"] {
      background: #e8fff7;
      border-color: rgba(232, 255, 247, 0.85);
      color: #062123;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
    }

    .ar-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid rgba(217, 255, 244, 0.46);
      background: #e8fff7;
      color: #062123;
      font-weight: 750;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22);
    }

    .unsupported {
      display: none;
      padding: 10px 12px;
      border: 1px solid rgba(255, 212, 116, 0.34);
      border-radius: 8px;
      color: #ffe4a8;
      background: rgba(70, 47, 0, 0.28);
      font-size: 13px;
    }

    model-viewer[ar-status="failed"] + .hud .unsupported {
      display: block;
    }
  </style>
</head>
<body>
  <main>
    <model-viewer
      id="dragonViewer"
      src="assets/dragon_web_flight.glb"
      ios-src="assets/dragon_web_flight.usdz"
      poster="assets/images/thumbnail.jpg"
      alt="三淵渓谷の龍モデル"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-placement="floor"
      ar-scale="fixed"
      camera-controls
      touch-action="pan-y"
      autoplay
      animation-name="Flight_Loop_12s"
      auto-rotate
      auto-rotate-delay="1200"
      rotation-per-second="18deg"
      shadow-intensity="0.7"
      shadow-softness="0.55"
      exposure="1.05"
      environment-image="neutral"
      camera-orbit="35deg 68deg 8m"
      min-camera-orbit="auto auto 3m"
      max-camera-orbit="auto auto 26m"
      field-of-view="35deg"
      reveal="auto">
      <button slot="ar-button" class="ar-button">ARで龍を見る</button>
    </model-viewer>

    <section class="hud" aria-label="三淵渓谷 龍 WebAR">
      <div class="hud-inner">
        <div>
          <h1>三淵渓谷 龍 WebAR</h1>
          <p>表示する龍を選んでから、ARボタンで現実空間に配置できます。iPhoneはSafari、AndroidはChromeで開いてください。</p>
        </div>
        <div class="unsupported">AR表示を開始できませんでした。HTTPSで公開されているか、端末がAR表示に対応しているか確認してください。</div>
        <div class="model-switcher" aria-label="龍モデル選択">
          <button class="model-button" type="button" data-model="flight" aria-pressed="true">飛行する龍</button>
          <button class="model-button" type="button" data-model="giant" aria-pressed="false">巨大な龍</button>
        </div>
        <div class="actions">
          <button id="audioButton" type="button">飛行音を再生</button>
          <a id="downloadLink" class="action" href="assets/dragon_web_flight.glb" download>GLBを確認</a>
        </div>
        <div id="status" class="status">飛行する龍を読み込み中です。</div>
      </div>
    </section>
  </main>

  <audio id="dragonAudio" preload="none" loop>
    <source src="assets/audio/dragon_flight.mp3" type="audio/mpeg">
    <source src="assets/audio/dragon_flight.wav" type="audio/wav">
  </audio>

  <script>
    const viewer = document.querySelector("#dragonViewer");
    const status = document.querySelector("#status");
    const audio = document.querySelector("#dragonAudio");
    const audioButton = document.querySelector("#audioButton");
    const downloadLink = document.querySelector("#downloadLink");
    const modelButtons = Array.from(document.querySelectorAll(".model-button"));

    const models = {
      flight: {
        label: "飛行する龍",
        src: "assets/dragon_web_flight.glb",
        iosSrc: "assets/dragon_web_flight.usdz",
        animation: "Flight_Loop_12s",
        orbit: "35deg 68deg 8m",
        maxOrbit: "auto auto 26m"
      },
      giant: {
        label: "巨大な龍",
        src: "assets/dragon_web_giant_approach.glb",
        iosSrc: "assets/dragon_web_giant_approach.usdz",
        animation: "Giant_Idle_S_Curve_Loop",
        orbit: "35deg 70deg 14m",
        maxOrbit: "auto auto 40m"
      }
    };

    let currentModelKey = "flight";

    async function playAvailableAnimation() {
      const model = models[currentModelKey];
      const animations = viewer.availableAnimations || [];
      console.log("[WEBAR_ANIMATIONS]", model.label, animations);

      if (model.animation && animations.includes(model.animation)) {
        viewer.animationName = model.animation;
        await viewer.play({ repetitions: Infinity });
        status.textContent = `${model.label}の準備ができました。再生中: ${model.animation}`;
        return;
      }

      if (animations.length > 0) {
        viewer.animationName = animations[0];
        await viewer.play({ repetitions: Infinity });
        status.textContent = `${model.label}の準備ができました。再生中: ${animations[0]}`;
        return;
      }

      viewer.animationName = "";
      status.textContent = `${model.label}の準備ができました。`;
    }

    function setModel(key) {
      const model = models[key];
      if (!model || key === currentModelKey) {
        return;
      }

      currentModelKey = key;
      modelButtons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.model === key));
      });

      status.textContent = `${model.label}を読み込み中です。`;
      viewer.pause();
      viewer.src = model.src;
      viewer.setAttribute("ios-src", model.iosSrc);
      viewer.setAttribute("camera-orbit", model.orbit);
      viewer.setAttribute("max-camera-orbit", model.maxOrbit);
      viewer.setAttribute("animation-name", model.animation);
      downloadLink.href = model.src;
    }

    modelButtons.forEach((button) => {
      button.addEventListener("click", () => setModel(button.dataset.model));
    });

    viewer.addEventListener("load", playAvailableAnimation);

    viewer.addEventListener("error", () => {
      const model = models[currentModelKey];
      status.textContent = `${model.src} / ${model.iosSrc} を assets フォルダーに配置してください。`;
    });

    viewer.addEventListener("ar-status", (event) => {
      if (event.detail.status === "session-started") {
        status.textContent = "AR表示中です。周囲の安全を確認して体験してください。";
      }
    });

    audioButton.addEventListener("click", async () => {
      try {
        if (audio.paused) {
          await audio.play();
          audioButton.textContent = "飛行音を停止";
          status.textContent = "飛行音を再生しています。";
        } else {
          audio.pause();
          audioButton.textContent = "飛行音を再生";
          status.textContent = "飛行音を停止しました。";
        }
      } catch (error) {
        status.textContent = "音声ファイルを確認してください。dragon_flight.mp3 または dragon_flight.wav が必要です。";
      }
    });
  </script>
</body>
</html>
