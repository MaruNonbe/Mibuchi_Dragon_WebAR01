<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0b2830" />
    <title>長井駅到着 GPS WebAR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
    <script src="./animation-player.js?v=9"></script>
    <link rel="stylesheet" href="./styles.css?v=9" />
  </head>
  <body>
    <video id="cameraFeed" class="camera-feed" autoplay playsinline muted></video>

    <div id="gate" class="panel">
      <h1>長井駅到着</h1>
      <p>長井駅から半径100m以内で、動物たちの弦楽四重奏が表示されます。</p>
      <button id="startButton" type="button">GPS WebARを開始</button>
      <p class="small">iOS / Android ともに、カメラ・位置情報・モーションの許可が必要です。</p>
    </div>

    <div id="status" class="status">
      <strong id="statusTitle">準備中</strong>
      <span id="distanceText">位置情報を待っています</span>
    </div>

    <div id="outside" class="outside hidden">
      <strong>長井駅に近づくと表示されます</strong>
      <span id="outsideDistance">現在地を確認中...</span>
    </div>

    <a-scene vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true; precision: mediump" embedded>
      <a-assets>
        <a-asset-item id="quartetModel" src="./assets/nagai_station_quartet.glb"></a-asset-item>
      </a-assets>

      <a-entity
        id="quartetStation"
        gltf-model="#quartetModel"
        position="0 -0.85 -6"
        rotation="0 0 0"
        scale="0.32 0.32 0.32"
        animation-mixer="loop: repeat"
        play-all-model-animations="timeScale: 1"
        visible="false"
      ></a-entity>

      <a-entity
        id="quartetHotelTest"
        gltf-model="#quartetModel"
        position="0 -0.85 -6"
        rotation="0 0 0"
        scale="0.32 0.32 0.32"
        animation-mixer="loop: repeat"
        play-all-model-animations="timeScale: 1"
        visible="false"
      ></a-entity>

      <a-entity
        id="fallbackStation"
        position="0 1.15 -3"
        rotation="0 180 0"
        visible="false"
      >
        <a-text value="長井駅到着" align="center" color="#ffd36a" width="5"></a-text>
        <a-box position="0 -0.45 0" width="2.4" height="0.35" depth="0.05" color="#0b65c2"></a-box>
      </a-entity>

      <a-entity
        id="fallbackHotelTest"
        position="0 1.15 -3"
        rotation="0 180 0"
        visible="false"
      >
        <a-text value="検証地点 到着" align="center" color="#ffd36a" width="5"></a-text>
        <a-box position="0 -0.45 0" width="2.4" height="0.35" depth="0.05" color="#0b65c2"></a-box>
      </a-entity>

      <a-camera look-controls="enabled: false"></a-camera>
    </a-scene>

    <script src="./main.js?v=9"></script>
  </body>
</html>
