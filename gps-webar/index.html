<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0b2830" />
    <title>フラワー長井線 到着 GPS WebAR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
    <script src="./animation-player.js?v=26"></script>
    <link rel="stylesheet" href="./styles.css?v=26" />
  </head>
  <body>
    <video id="cameraFeed" class="camera-feed" autoplay playsinline muted></video>

    <div id="gate" class="panel">
      <h1>フラワー長井線 到着AR</h1>
      <p>フラワー長井線の各駅から半径100m以内で、駅ごとの動物アンサンブルが表示されます。</p>
      <button id="startButton" type="button">GPS WebARを開始</button>
      <button id="saveHomeButton" class="secondary" type="button">現在地を自宅テスト地点に保存</button>
      <p class="small">iOS / Android ともに、カメラ・位置情報の許可が必要です。</p>
    </div>

    <div id="status" class="status">
      <strong id="statusTitle">準備中</strong>
      <span id="distanceText">位置情報を待っています</span>
    </div>

    <div id="previewPanel" class="preview-panel hidden">
      <button id="previewPrev" class="preview-step" type="button" aria-label="前の駅">‹</button>
      <select id="previewStationSelect" aria-label="評価する駅"></select>
      <button id="previewNext" class="preview-step" type="button" aria-label="次の駅">›</button>
      <button id="gpsModeButton" class="preview-gps" type="button">GPS</button>
    </div>

    <button id="musicButton" class="music-button hidden" type="button">音楽</button>

    <div id="photoGuidePanel" class="photo-guide-panel hidden">
      <button id="modelSmallerButton" class="guide-button" type="button" aria-label="キャラクターを小さく">小</button>
      <button id="modelLargerButton" class="guide-button" type="button" aria-label="キャラクターを大きく">大</button>
      <button id="childGuideButton" class="guide-button wide" type="button">立ち位置</button>
    </div>

    <div id="childGuideOverlay" class="child-guide-overlay hidden" aria-hidden="true">
      <div class="child-guide-frame">
        <div class="child-guide-head"></div>
        <div class="child-guide-body"></div>
      </div>
      <div class="child-guide-feet">
        <span></span>
        <span></span>
      </div>
    </div>

    <div id="outside" class="outside hidden">
      <strong>フラワー長井線の駅に近づくと表示されます</strong>
      <span id="outsideDistance">現在地を確認中...</span>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="antialias: true; alpha: true; precision: mediump"
      embedded
    >
      <a-entity
        id="stationModel"
        position="0 -1.25 -7.5"
        rotation="0 0 0"
        scale="0.80 0.80 0.80"
        animation-mixer="loop: repeat"
        play-all-model-animations="timeScale: 1"
        visible="false"
      ></a-entity>

      <a-entity
        id="fallbackStationModel"
        position="0 1.15 -3"
        rotation="0 180 0"
        visible="false"
      >
        <a-text value="弦楽アンサンブル 到着" align="center" color="#ffd36a" width="5"></a-text>
        <a-box position="0 -0.45 0" width="2.4" height="0.35" depth="0.05" color="#0b65c2"></a-box>
      </a-entity>

      <a-camera look-controls="enabled: false"></a-camera>
    </a-scene>

    <script src="./main.js?v=26"></script>
  </body>
</html>
